<!DOCTYPE html>
<html>
<head>
    <title>Проверка кода</title>
</head>
<body>
    <h2>Введите код доступа</h2>
    
    <div id="captcha-box">
        <p>Решите пример: <span id="question"></span></p>
        <input type="number" id="captcha-input" placeholder="Ответ">
    </div>

    <hr>
    
    <input type="text" id="user-code" placeholder="Ваш код">
    <button onclick="handleVerify()">Активировать</button>

    <script>
        // Конфиг (Заполни свои данные)
        const CONFIG = {
            owner: 'MELVPNBOT',
            repo: 'MELVPNBOT/lolvpnsite',
            path: 'code.json',
            token: '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' // ВНИМАНИЕ: Виден в коде!
        };

        // Генерация капчи
        let captchaAnswer;
        function generateCaptcha() {
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * 10) + 1;
            captchaAnswer = a + b;
            document.getElementById('question').innerText = `${a} + ${b}`;
        }
        generateCaptcha();

        async function handleVerify() {
            const userCaptcha = document.getElementById('captcha-input').value;
            const userCode = document.getElementById('user-code').value;

            if (parseInt(userCaptcha) !== captchaAnswer) {
                alert("Капча решена неверно!");
                generateCaptcha();
                return;
            }

            // Блокируем кнопку на время запроса
            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Проверка...";

            try {
                // 1. Получаем текущий файл
                const url = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `token ${CONFIG.token}` }
                });
                const fileData = await res.json();
                const codes = JSON.parse(atob(fileData.content));

                // 2. Ищем код
                const index = codes.findIndex(item => item.code === userCode);

                if (index === -1) {
                    alert("Код не найден!");
                } else {
                    // Изменяем данные
                    if (codes[index].activations > 1) {
                        codes[index].activations--;
                    } else {
                        codes.splice(index, 1);
                    }

                    // 3. Сохраняем обратно
                    const updateRes = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${CONFIG.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: "Code activation",
                            content: btoa(JSON.stringify(codes, null, 2)),
                            sha: fileData.sha
                        })
                    });

                    if (updateRes.ok) {
                        alert("Успех! Переход на главную...");
                        window.location.href = 'index.html';
                        return;
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Ошибка при связи с GitHub");
            }

            btn.disabled = false;
            btn.innerText = "Активировать";
        }
    </script>
</body>
</html>
