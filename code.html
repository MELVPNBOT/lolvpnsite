<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LolVPN | Активация доступа</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --bg: #0f0f12;
            --card: #1a1a20;
            --text: #ffffff;
            --input-bg: #25252d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Аватарка в углу */
        .header-logo {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(26, 26, 32, 0.8);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid #333;
            backdrop-filter: blur(5px);
        }

        .header-logo img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
        }

        .header-logo span {
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Карточка центральная */
        .container {
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            text-align: center;
            width: 90%;
            max-width: 420px;
            border: 1px solid #2e2e38;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 15px 0;
            background: linear-gradient(45deg, #007bff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .info-text {
            font-size: 0.95rem;
            color: #b0b0b8;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Капча и ввод */
        #captcha-box {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 1px dashed var(--primary);
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #3e3e4a;
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="header-logo">
        <img src="https://raw.githubusercontent.com/MELVPNBOT/lolvpnsite/main/lolvpnava.png" alt="Logo">
        <span>LolVPN Premium</span>
    </div>

    <div class="container">
        <h1>ЛолВПН</h1>
        <p class="info-text">
            Приватный доступ к высокоскоростным узлам. <br>
            VLESS + Reality • Без лимитов • Полная анонимность.
        </p>

        <div id="captcha-box">
            Решите пример: <span id="question"></span>
        </div>

        <input type="number" id="captcha-input" placeholder="Ответ на пример">
        <input type="text" id="user-code" placeholder="Введите ваш код активации">
        
        <button id="main-btn" onclick="handleVerify()">Активировать доступ</button>
    </div>

    <script>
        const RAW_URL = 'https://raw.githubusercontent.com/MELVPNBOT/lolvpnsite/refs/heads/main/code.json';
        const REDIRECT_URL = 'https://lolvpnsub.vercel.app/';

        let captchaAnswer;

        // Генерация простой капчи
        function generateCaptcha() {
            const a = Math.floor(Math.random() * 9) + 1;
            const b = Math.floor(Math.random() * 9) + 1;
            captchaAnswer = a + b;
            document.getElementById('question').innerText = `${a} + ${b}`;
            document.getElementById('captcha-input').value = '';
        }

        generateCaptcha();

        async function handleVerify() {
            const userCaptcha = document.getElementById('captcha-input').value;
            const userCode = document.getElementById('user-code').value.trim();
            const btn = document.getElementById('main-btn');

            if (!userCaptcha || !userCode) {
                alert("Заполните все поля!");
                return;
            }

            if (parseInt(userCaptcha) !== captchaAnswer) {
                alert("Капча решена неверно!");
                generateCaptcha();
                return;
            }

            btn.disabled = true;
            btn.innerText = "Проверка кода...";

            try {
                // Получаем данные напрямую из твоего GitHub RAW файла
                // Добавляем ?t=Date.now() чтобы избежать кэширования старых кодов
                const response = await fetch(`${RAW_URL}?t=${Date.now()}`);
                
                if (!response.ok) throw new Error("Не удалось загрузить базу кодов");

                const codes = await response.json();
                
                // Ищем введенный код в массиве JSON
                const foundCode = codes.find(item => item.code === userCode && item.activations > 0);

                if (foundCode) {
                    btn.innerText = "Успешно! Переходим...";
                    // Переход на версель
                    window.location.href = REDIRECT_URL;
                } else {
                    alert("Ошибка: Код не найден или у него закончились активации.");
                    btn.disabled = false;
                    btn.innerText = "Активировать доступ";
                    generateCaptcha();
                }

            } catch (err) {
                console.error(err);
                alert("Ошибка подключения к GitHub. Попробуйте позже.");
                btn.disabled = false;
                btn.innerText = "Активировать доступ";
            }
        }
    </script>
</body>
</html>
