<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOLVPN | Приватная подписка</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Шапка сайта */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
        }

        /* Аватарка в левом верхнем углу */
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #00d4ff;
            object-fit: cover;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        /* Центральный контент */
        .main-content {
            margin-top: 15vh;
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        .title {
            font-size: 48px;
            font-weight: 900;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .description {
            font-size: 20px;
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 40px;
        }

        /* Кнопка связи в ТГ */
        .tg-link {
            display: inline-block;
            background: linear-gradient(135deg, #00d4ff 0%, #007bff 100%);
            color: #000;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .tg-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.5);
            background: #fff;
        }

        .tg-username {
            display: block;
            margin-top: 15px;
            color: #00d4ff;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://raw.githubusercontent.com/MELVPNBOT/lolvpnsite/main/lolvpnava.png" alt="Avatar" class="avatar">
    </header>

    <div class="main-content">
        <div class="title">ЛОЛВПН</div>
        
        <p class="description">
            Скоростной доступ, обход блокировок и полная анонимность. 
            Ваш интернет — ваши правила.
        </p>

        <a href="https://t.me/sanek37r" class="tg-link">
            ПОЛУЧИТЬ ПРИВАТНУЮ ПОДПИСКУ
        </a>
        
        <span class="tg-username">написать в Telegram: @sanek37r</span>
    </div>

</body>
</html>
